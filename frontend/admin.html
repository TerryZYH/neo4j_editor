<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo4j 编辑器 — 管理后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --text: #c9d1d9; --text-muted: #8b949e;
      --accent: #58a6ff; --danger: #f85149; --success: #56d364;
      --warning: #e3b341; --radius: 8px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px; min-height: 100vh;
    }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 16px; font-weight: 600; color: var(--accent); }
    .logo span { color: var(--text-muted); font-weight: 400; font-size: 13px; }
    .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    .btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius); padding: 6px 14px; cursor: pointer; font-size: 13px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background .15s; text-decoration: none;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .btn.primary:hover { background: #79c0ff; }
    .btn.danger { border-color: var(--danger); color: var(--danger); background: transparent; }
    .btn.danger:hover { background: var(--danger); color: #fff; }
    .btn.sm { padding: 4px 10px; font-size: 12px; }
    .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab {
      padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Cards */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 20px;
    }
    .card-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-weight: 600; font-size: 15px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted);
      background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .badge.admin   { background: #f39c1222; color: #f39c12; border: 1px solid #f39c1240; }
    .badge.user    { background: #58a6ff22; color: #58a6ff; border: 1px solid #58a6ff40; }
    .badge.active  { background: #56d36422; color: #56d364; border: 1px solid #56d36440; }
    .badge.inactive{ background: #f8514922; color: #f85149; border: 1px solid #f8514940; }

    .user-dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px;
    }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(2px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: 420px; max-width: 95vw;
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .modal-title { font-size: 16px; font-weight: 600; flex: 1; }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer {
      padding: 16px 20px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
    input[type="text"], input[type="password"], input[type="email"], select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 8px 10px;
      font-size: 13px; outline: none; font-family: inherit;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 2000;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px; font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      animation: slideIn .2s ease;
    }
    .toast.ok  { border-color: var(--success); }
    .toast.err { border-color: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .empty { padding: 40px; text-align: center; color: var(--text-muted); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Neo4j Editor <span>管理后台</span></div>
  <div class="header-right">
    <a href="/" class="btn">← 返回编辑器</a>
    <span id="admin-name" style="font-size:13px;color:var(--text-muted)"></span>
    <button class="btn danger sm" onclick="doLogout()">退出</button>
  </div>
</header>

<div class="main">
  <div class="page-title">管理后台</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('users')">用户管理</div>
    <div class="tab" onclick="switchTab('sessions')">在线用户</div>
    <div class="tab" onclick="switchTab('locks')">编辑锁</div>
  </div>

  <!-- Users tab -->
  <div id="tab-users" class="tab-pane active">
    <div class="card">
      <div class="card-header">
        <span class="card-title">用户列表</span>
        <button class="btn primary sm" onclick="openCreateModal()">＋ 新建用户</button>
      </div>
      <table>
        <thead><tr><th>用户</th><th>邮箱</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>
  </div>

  <!-- Sessions tab -->
  <div id="tab-sessions" class="tab-pane">
    <div class="card">
      <div class="card-header">
        <span class="card-title">当前在线用户</span>
        <button class="btn sm" onclick="loadSessions()">🔄 刷新</button>
      </div>
      <table>
        <thead><tr><th>用户</th><th>颜色标识</th></tr></thead>
        <tbody id="sessions-table"></tbody>
      </table>
    </div>
  </div>

  <!-- Locks tab -->
  <div id="tab-locks" class="tab-pane">
    <div class="card">
      <div class="card-header">
        <span class="card-title">当前编辑锁</span>
        <button class="btn sm" onclick="loadLocks()">🔄 刷新</button>
      </div>
      <table>
        <thead><tr><th>实体 ID</th><th>持锁用户</th><th>锁定时间</th><th>操作</th></tr></thead>
        <tbody id="locks-table"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create/Edit user modal -->
<div class="modal-overlay hidden" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">新建用户</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-user-id" value="" />
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="modal-username" placeholder="至少 2 个字符" />
      </div>
      <div class="form-group" id="modal-email-group">
        <label>邮箱</label>
        <input type="email" id="modal-email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label id="modal-pw-label">密码</label>
        <input type="password" id="modal-password" placeholder="至少 6 个字符（留空则不修改）" />
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="modal-role">
          <option value="user">普通用户</option>
          <option value="admin">管理员</option>
        </select>
      </div>
      <div class="form-group" id="modal-active-group" style="display:none">
        <label>状态</label>
        <select id="modal-active">
          <option value="1">启用</option>
          <option value="0">禁用</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveUser()">保存</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const API = 'http://localhost:8000/api';
let token = localStorage.getItem('auth_token');

// ── Auth check ─────────────────────────────────────────────────────────────
async function checkAuth() {
  if (!token) { location.href = '/'; return; }
  try {
    const res = await fetch(API + '/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) { location.href = '/'; return; }
    const user = await res.json();
    if (user.role !== 'admin') { alert('需要管理员权限'); location.href = '/'; return; }
    document.getElementById('admin-name').textContent = user.username;
  } catch { location.href = '/'; }
}

function doLogout() {
  localStorage.removeItem('auth_token');
  location.href = '/';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function apiFetch(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    ...(body ? { body: JSON.stringify(body) } : {}),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || res.statusText);
  }
  return res.status === 204 ? null : res.json();
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['users','sessions','locks'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'users')    loadUsers();
  if (name === 'sessions') loadSessions();
  if (name === 'locks')    loadLocks();
}

// ── Users ──────────────────────────────────────────────────────────────────
const USER_COLORS = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#e91e63","#00bcd4","#ff5722"];
function userColor(username) {
  let h = 0;
  for (let i = 0; i < username.length; i++) h = Math.imul(31, h) + username.charCodeAt(i) | 0;
  return USER_COLORS[Math.abs(h) % USER_COLORS.length];
}

async function loadUsers() {
  try {
    const users = await apiFetch('GET', '/admin/users');
    const tbody = document.getElementById('users-table');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无用户</td></tr>'; return; }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>
          <span class="user-dot" style="background:${userColor(u.username)}"></span>
          <strong>${u.username}</strong>
        </td>
        <td style="color:var(--text-muted)">${u.email}</td>
        <td><span class="badge ${u.role}">${u.role === 'admin' ? '管理员' : '普通用户'}</span></td>
        <td><span class="badge ${u.is_active ? 'active' : 'inactive'}">${u.is_active ? '启用' : '禁用'}</span></td>
        <td style="color:var(--text-muted);font-size:12px">${u.created_at.slice(0,16)}</td>
        <td>
          <div class="actions">
            <button class="btn sm" onclick="openEditModal(${u.id},'${u.username}','${u.email}','${u.role}',${u.is_active})">编辑</button>
            <button class="btn sm danger" onclick="deleteUser(${u.id},'${u.username}')">删除</button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}

async function deleteUser(id, username) {
  if (!confirm(`确定删除用户「${username}」吗？`)) return;
  try {
    await apiFetch('DELETE', `/admin/users/${id}`);
    toast('✅ 用户已删除');
    loadUsers();
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}

// ── User modal ─────────────────────────────────────────────────────────────
function openCreateModal() {
  document.getElementById('modal-title').textContent = '新建用户';
  document.getElementById('modal-user-id').value = '';
  document.getElementById('modal-username').value = '';
  document.getElementById('modal-email').value = '';
  document.getElementById('modal-password').value = '';
  document.getElementById('modal-role').value = 'user';
  document.getElementById('modal-pw-label').textContent = '密码';
  document.getElementById('modal-email-group').style.display = '';
  document.getElementById('modal-active-group').style.display = 'none';
  document.getElementById('modal-username').readOnly = false;
  document.getElementById('user-modal').classList.remove('hidden');
}

function openEditModal(id, username, email, role, isActive) {
  document.getElementById('modal-title').textContent = '编辑用户';
  document.getElementById('modal-user-id').value = id;
  document.getElementById('modal-username').value = username;
  document.getElementById('modal-username').readOnly = true;
  document.getElementById('modal-email').value = email;
  document.getElementById('modal-password').value = '';
  document.getElementById('modal-role').value = role;
  document.getElementById('modal-active').value = isActive ? '1' : '0';
  document.getElementById('modal-pw-label').textContent = '新密码（留空不修改）';
  document.getElementById('modal-email-group').style.display = 'none';
  document.getElementById('modal-active-group').style.display = '';
  document.getElementById('user-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('user-modal').classList.add('hidden');
}

async function saveUser() {
  const userId = document.getElementById('modal-user-id').value;
  const isEdit = !!userId;

  try {
    if (isEdit) {
      const body = {
        role: document.getElementById('modal-role').value,
        is_active: document.getElementById('modal-active').value === '1',
      };
      const pw = document.getElementById('modal-password').value;
      if (pw) body.password = pw;
      await apiFetch('PUT', `/admin/users/${userId}`, body);
      toast('✅ 用户已更新');
    } else {
      const username = document.getElementById('modal-username').value.trim();
      const email    = document.getElementById('modal-email').value.trim();
      const password = document.getElementById('modal-password').value;
      const role     = document.getElementById('modal-role').value;
      await apiFetch('POST', '/admin/users', { username, email, password, role });
      toast('✅ 用户已创建');
    }
    closeModal();
    loadUsers();
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}

// ── Sessions ───────────────────────────────────────────────────────────────
async function loadSessions() {
  try {
    const sessions = await apiFetch('GET', '/admin/sessions');
    const tbody = document.getElementById('sessions-table');
    if (!sessions.length) {
      tbody.innerHTML = '<tr><td colspan="2" class="empty">当前无在线用户</td></tr>';
      return;
    }
    tbody.innerHTML = sessions.map(s => `
      <tr>
        <td><span class="user-dot" style="background:${s.color}"></span>${s.username}</td>
        <td><span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:${s.color};vertical-align:middle"></span> ${s.color}</td>
      </tr>
    `).join('');
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}

// ── Locks ──────────────────────────────────────────────────────────────────
async function loadLocks() {
  try {
    const locks = await apiFetch('GET', '/admin/locks');
    const tbody = document.getElementById('locks-table');
    if (!locks.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">当前无编辑锁</td></tr>';
      return;
    }
    tbody.innerHTML = locks.map(lk => `
      <tr>
        <td style="font-size:12px;color:var(--text-muted);font-family:monospace">${lk.entity_id.slice(-16)}</td>
        <td><span class="user-dot" style="background:${lk.color}"></span>${lk.username}</td>
        <td style="color:var(--text-muted);font-size:12px">${lk.locked_at.slice(0,19).replace('T',' ')}</td>
        <td>
          <button class="btn sm danger" onclick="forceUnlock('${lk.entity_id}','${lk.username}')">强制解锁</button>
        </td>
      </tr>
    `).join('');
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}

async function forceUnlock(entityId, username) {
  if (!confirm(`强制解除「${username}」持有的编辑锁？`)) return;
  try {
    await apiFetch('DELETE', `/admin/locks/${encodeURIComponent(entityId)}`);
    toast('✅ 编辑锁已解除');
    loadLocks();
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}

// ── Init ───────────────────────────────────────────────────────────────────
checkAuth().then(() => loadUsers());
</script>
</body>
</html>
