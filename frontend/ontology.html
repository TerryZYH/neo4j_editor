<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本体管理 · Neo4j Editor</title>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="styles/ontology.css" />
</head>
<body>

<header>
  <a class="back-link" href="/">← 返回编辑器</a>
  <div style="width:1px;height:20px;background:var(--border)"></div>
  <div class="page-title">本体管理</div>
  <div class="mode-badge warn" id="mode-badge">宽松模式</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('classes', this)">类定义</div>
  <div class="tab" onclick="switchTab('relations', this)">关系约束</div>
  <div class="tab" onclick="switchTab('config', this)">校验设置</div>
</div>

<!-- ── Tab 1: 类定义 ── -->
<div id="tab-classes" class="tab-content active">
  <div class="toolbar">
    <div>
      <div class="toolbar-title">类定义</div>
      <div class="toolbar-sub">定义图谱中合法的节点标签类型</div>
    </div>
    <button class="btn primary" onclick="openClassModal(null)">＋ 新建类</button>
  </div>
  <table>
    <thead><tr>
      <th>标签</th><th>显示名</th><th>颜色</th><th>说明</th><th>字段定义</th><th>创建人</th><th>操作</th>
    </tr></thead>
    <tbody id="class-tbody"></tbody>
  </table>
</div>

<!-- ── Tab 2: 关系约束 ── -->
<div id="tab-relations" class="tab-content">
  <div class="toolbar">
    <div>
      <div class="toolbar-title">关系约束</div>
      <div class="toolbar-sub">定义哪些类之间允许建立哪种关系（三元组约束）</div>
    </div>
    <button class="btn primary" onclick="openRelModal(null)">＋ 新建关系约束</button>
  </div>
  <table>
    <thead><tr>
      <th>关系三元组</th><th>显示名</th><th>说明</th><th>字段定义</th><th>创建人</th><th>操作</th>
    </tr></thead>
    <tbody id="rel-tbody"></tbody>
  </table>
  <div id="ontology-graph-wrap"></div>
</div>

<!-- ── Tab 3: 校验设置 ── -->
<div id="tab-config" class="tab-content">
  <div style="max-width:560px">
    <div class="toolbar" style="margin-bottom:20px">
      <div>
        <div class="toolbar-title">校验设置</div>
        <div class="toolbar-sub">控制编辑器在违反本体约束时的行为</div>
      </div>
    </div>
    <div class="config-card">
      <div class="config-card-title">校验模式</div>
      <div class="config-card-desc">
        当节点标签或关系三元组不在本体定义中时：<br>
        <b>宽松模式</b>会弹出警告但允许保存；<b>严格模式</b>会直接拒绝操作。<br>
        <span style="color:var(--warning)">注意：如果本体为空（未定义任何类或关系），校验自动跳过。</span>
      </div>
      <div class="radio-group">
        <label class="radio-option" id="opt-warn">
          <input type="radio" name="vmode" value="warn" onchange="saveConfig('warn')" />
          <div>
            <div class="radio-label">🟡 宽松模式（warn）</div>
            <div class="radio-desc">违反约束时弹出 toast 警告，但操作仍可继续。适合图谱建设初期。</div>
          </div>
        </label>
        <label class="radio-option" id="opt-strict">
          <input type="radio" name="vmode" value="strict" onchange="saveConfig('strict')" />
          <div>
            <div class="radio-label">🔴 严格模式（strict）</div>
            <div class="radio-desc">违反约束时前端和后端都会阻止操作。适合本体已稳定的生产环境。</div>
          </div>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- ── Class modal ── -->
<div class="modal-overlay hidden" id="class-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="class-modal-title">新建类</div>
      <button class="modal-close" onclick="closeModal('class-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Neo4j 标签名 <span style="color:var(--danger)">*</span></label>
        <input type="text" id="cm-label" placeholder="例: Person（与 Neo4j 中完全一致）" />
      </div>
      <div class="form-group">
        <label>显示名</label>
        <input type="text" id="cm-display" placeholder="例: 人员" />
      </div>
      <div class="form-group">
        <label>颜色</label>
        <div class="color-row">
          <input type="color" id="cm-color-picker" value="#4C8EDA" oninput="syncColor(this)" style="width:48px;flex-shrink:0" />
          <input type="text" id="cm-color" value="#4C8EDA" placeholder="#4C8EDA" oninput="syncColorPicker(this)" />
        </div>
      </div>
      <div class="form-group">
        <label>图标（Emoji）</label>
        <input type="text" id="cm-icon" placeholder="例: 🧵" maxlength="4" />
      </div>
      <div class="form-group">
        <label>说明</label>
        <input type="text" id="cm-desc" placeholder="这个类表示…" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('class-modal')">取消</button>
      <button class="btn primary" onclick="saveClass()">保存</button>
    </div>
  </div>
</div>

<!-- ── Relation modal ── -->
<div class="modal-overlay hidden" id="rel-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="rel-modal-title">新建关系约束</div>
      <button class="modal-close" onclick="closeModal('rel-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group" id="rm-triple-group">
        <label>起点类 <span style="color:var(--danger)">*</span> <span style="color:var(--text-muted);font-weight:400">（填 * 表示任意）</span></label>
        <input type="text" id="rm-src" list="rm-src-list" placeholder="例: Person 或 *" />
        <datalist id="rm-src-list"></datalist>
      </div>
      <div class="form-group" id="rm-rel-group">
        <label>关系类型 <span style="color:var(--danger)">*</span></label>
        <input type="text" id="rm-rel" placeholder="例: SUB_BREED" style="text-transform:uppercase" />
      </div>
      <div class="form-group" id="rm-tgt-group">
        <label>终点类 <span style="color:var(--danger)">*</span> <span style="color:var(--text-muted);font-weight:400">（填 * 表示任意）</span></label>
        <input type="text" id="rm-tgt" list="rm-tgt-list" placeholder="例: Company 或 *" />
        <datalist id="rm-tgt-list"></datalist>
      </div>
      <div class="form-group">
        <label>显示名</label>
        <input type="text" id="rm-display" placeholder="例: 子品种" />
      </div>
      <div class="form-group">
        <label>说明</label>
        <input type="text" id="rm-desc" placeholder="这个关系表示…" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('rel-modal')">取消</button>
      <button class="btn primary" onclick="saveRelation()">保存</button>
    </div>
  </div>
</div>

<!-- ── Field management modal ── -->
<div class="modal-overlay hidden" id="field-modal">
  <div class="modal field-modal-inner">
    <div class="modal-header">
      <div class="modal-title" id="field-modal-title">字段定义</div>
      <button class="modal-close" onclick="closeModal('field-modal')">×</button>
    </div>
    <!-- Category legend -->
    <div class="field-legend">
      <span class="fbadge fbadge-id">🔑 ID字段</span><span>唯一标识实体</span>
      <span style="color:var(--border)">|</span>
      <span class="fbadge fbadge-required">★ 必填</span><span>创建时必须填写</span>
      <span style="color:var(--border)">|</span>
      <span class="fbadge fbadge-constrained">⚡ 约束</span><span>有枚举或正则限制</span>
    </div>
    <!-- Field list -->
    <div class="field-list-body" id="field-list-body">
      <div style="color:var(--text-muted);font-size:13px;text-align:center;padding:24px 0">加载中…</div>
    </div>
    <!-- Add / edit panel -->
    <div class="field-add-panel">
      <div style="padding:10px 20px;display:flex;gap:8px;align-items:center">
        <button class="btn primary" onclick="toggleFieldForm()" id="btn-toggle-field-form">＋ 新增字段</button>
        <span id="field-form-editing-hint" style="font-size:12px;color:var(--text-muted);display:none"></span>
      </div>
      <div id="field-form-wrap" style="display:none" class="field-add-panel-inner">
        <div class="field-form-grid">
          <div class="form-group" style="margin-bottom:0">
            <label>字段名 <span style="color:var(--danger)">*</span></label>
            <input type="text" id="ff-key" placeholder="例: name" />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>数据类型</label>
            <select id="ff-type">
              <option value="string">文本 (string)</option>
              <option value="number">数字 (number)</option>
              <option value="boolean">布尔 (boolean)</option>
              <option value="date">日期 (date)</option>
              <option value="list">列表 (list)</option>
            </select>
          </div>
        </div>
        <div class="field-checks">
          <label class="field-check-label">
            <input type="checkbox" id="ff-id" onchange="onIdCheckChange(this)" />
            🔑 ID字段（唯一标识）
          </label>
          <label class="field-check-label">
            <input type="checkbox" id="ff-required" />
            ★ 必填字段
          </label>
        </div>
        <div class="field-form-grid">
          <div class="form-group" style="margin-bottom:0">
            <label>枚举约束 <span style="color:var(--text-muted);font-weight:400">（每行一个值，空则不限）</span></label>
            <textarea id="ff-enum" rows="3" placeholder="值1&#10;值2&#10;值3" style="resize:vertical;min-height:72px"></textarea>
          </div>
          <div>
            <div class="form-group">
              <label>正则约束 <span style="color:var(--text-muted);font-weight:400">（空则不限）</span></label>
              <input type="text" id="ff-regex" placeholder="例: ^[A-Z]{2}\d{4}$" />
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>默认值</label>
              <input type="text" id="ff-default" placeholder="（可选）" />
            </div>
          </div>
        </div>
        <div class="form-group" style="margin-top:10px">
          <label>说明</label>
          <input type="text" id="ff-desc" placeholder="这个字段表示…" />
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
          <button class="btn" onclick="cancelFieldForm()">取消</button>
          <button class="btn primary" onclick="saveField()">保存字段</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/ontology.js"></script>
</body>
</html>
