<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo4j 图谱编辑器</title>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --danger: #f85149;
      --success: #56d364;
      --warning: #e3b341;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
    }
    .logo {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }
    .logo span { color: var(--text-muted); font-weight: 400; font-size: 13px; }

    .search-wrap {
      flex: 1;
      max-width: 360px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 12px 6px 32px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .header-btns { display: flex; gap: 8px; margin-left: auto; align-items: center; }
    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: background .15s, border-color .15s;
      user-select: none;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn.danger { background: transparent; border-color: var(--danger); color: var(--danger); }
    .btn.danger:hover { background: var(--danger); color: #fff; }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .status-dot.ok { background: var(--success); }
    .status-dot.err { background: var(--danger); }

    /* ── Online users ── */
    .online-users {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-right: 4px;
    }
    .user-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      border: 2px solid var(--bg);
      margin-left: -6px;
      title: attr(title);
      cursor: default;
      flex-shrink: 0;
    }
    .user-avatar:first-child { margin-left: 0; }

    /* ── User chip ── */
    .user-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px 3px 6px;
      font-size: 12px;
    }
    .user-chip-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .role-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
    }
    .role-badge.admin { background: #f39c1222; color: #f39c12; border: 1px solid #f39c1244; }
    .role-badge.user  { background: #58a6ff22; color: #58a6ff; border: 1px solid #58a6ff44; }

    /* ── Layout ── */
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left sidebar ── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-section {
      border-bottom: 1px solid var(--border);
      padding: 12px;
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .label-list { display: flex; flex-direction: column; gap: 4px; }
    .label-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .1s;
    }
    .label-item:hover { background: var(--surface2); }
    .label-item.active { background: var(--surface2); }
    .label-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .label-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .label-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border-radius: 10px;
      padding: 1px 6px;
    }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-item {
      background: var(--surface2);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .sidebar-actions { padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .sidebar-actions .btn { justify-content: center; width: 100%; }

    /* ── Canvas ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #graph-canvas {
      width: 100%;
      height: 100%;
    }

    .canvas-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(22,27,34,.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--text-muted);
      pointer-events: none;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    .zoom-controls {
      position: absolute;
      bottom: 52px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .zoom-controls .btn {
      width: 32px;
      height: 32px;
      padding: 0;
      justify-content: center;
      font-size: 16px;
    }

    /* ── Right panel ── */
    .inspector {
      width: 280px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width .2s;
      overflow: hidden;
    }
    .inspector.hidden { width: 0; }
    .inspector-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .inspector-title { font-weight: 600; flex: 1; }
    .inspector-close {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 16px; padding: 2px;
    }
    .inspector-close:hover { color: var(--text); }
    .inspector-body { flex: 1; overflow-y: auto; padding: 12px 16px; }

    .prop-section { margin-bottom: 16px; }
    .prop-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .prop-row { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
    .prop-key { font-size: 11px; color: var(--text-muted); }
    .prop-val {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
      word-break: break-all;
    }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .lock-notice {
      background: #f39c1215;
      border: 1px solid #f39c1240;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #f39c12;
      margin-bottom: 12px;
    }

    .inspector-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .inspector-footer .btn { flex: 1; justify-content: center; font-size: 12px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 480px;
      max-width: 95vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .modal-title { font-size: 16px; font-weight: 600; flex: 1; }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
    input[type="text"], input[type="password"], input[type="email"], select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus,
    select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface2); }

    .props-editor { display: flex; flex-direction: column; gap: 6px; }
    .prop-edit-row { display: flex; gap: 6px; align-items: center; }
    .prop-edit-row input { flex: 1; }
    .prop-del-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--danger);
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
      transition: background .1s;
    }
    .prop-del-btn:hover { background: var(--danger); color: #fff; }
    .add-prop-btn {
      background: none;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 6px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      transition: border-color .15s, color .15s;
    }
    .add-prop-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #auth-overlay.hidden { display: none; }
    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 380px;
      max-width: 95vw;
      padding: 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }
    .auth-logo {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .auth-sub {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 7px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .auth-tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-error {
      background: #f8514922;
      border: 1px solid #f8514944;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--danger);
      display: none;
    }
    .auth-error.show { display: block; }
    .auth-btn {
      background: var(--accent);
      border: none;
      color: #000;
      font-weight: 700;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
    }
    .auth-btn:hover { background: var(--accent-hover); }
    .auth-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Search results dropdown ── */
    .search-results {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 4px;
      z-index: 200;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .search-results.hidden { display: none; }
    .search-result-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--surface2); }
    .result-label-tag {
      font-size: 11px;
      border-radius: 10px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .result-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-id { font-size: 11px; color: var(--text-muted); }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      animation: slideIn .2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.ok { border-color: var(--success); }
    .toast.err { border-color: var(--danger); }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ── Empty state ── */
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .empty-state.hidden { display: none; }
    .empty-icon { font-size: 48px; }
    .empty-text { font-size: 15px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

<!-- ── Auth overlay ──────────────────────────────────────── -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">Neo4j Editor</div>
    <div class="auth-sub">图谱协作编辑平台</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登录</div>
      <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">注册</div>
    </div>
    <div id="auth-error" class="auth-error"></div>

    <!-- Login form -->
    <div id="form-login" class="auth-form">
      <div class="form-group" style="margin:0">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="输入用户名" autocomplete="username" />
      </div>
      <div class="form-group" style="margin:0">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="输入密码" autocomplete="current-password" />
      </div>
      <button class="auth-btn" onclick="doLogin()">登录</button>
    </div>

    <!-- Register form -->
    <div id="form-register" class="auth-form" style="display:none">
      <div class="form-group" style="margin:0">
        <label>用户名</label>
        <input type="text" id="reg-username" placeholder="至少 2 个字符" autocomplete="username" />
      </div>
      <div class="form-group" style="margin:0">
        <label>邮箱</label>
        <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="form-group" style="margin:0">
        <label>密码</label>
        <input type="password" id="reg-password" placeholder="至少 6 个字符" autocomplete="new-password" />
      </div>
      <button class="auth-btn" onclick="doRegister()">注册</button>
      <div class="auth-hint">首位注册用户自动成为管理员</div>
    </div>
  </div>
</div>

<!-- ── Header ───────────────────────────────────────────── -->
<header>
  <div class="logo">Neo4j Editor <span>图谱编辑</span></div>

  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input id="search-input" type="text" placeholder="搜索节点..." autocomplete="off" />
    <div id="search-results" class="search-results hidden"></div>
  </div>

  <div class="header-btns">
    <button class="btn" id="btn-load">🔄 加载图谱</button>
    <button class="btn primary" id="btn-add-node">＋ 新建节点</button>
    <button class="btn" id="btn-add-edge" title="选中两个节点后创建关系">🔗 新建关系</button>
    <button class="btn danger" id="btn-delete" title="删除选中元素">🗑 删除</button>

    <div style="width:1px;height:24px;background:var(--border);margin:0 4px;"></div>

    <!-- Online users -->
    <div class="online-users" id="online-users" title="在线用户"></div>

    <!-- Current user chip -->
    <div class="user-chip" id="user-chip" style="display:none">
      <div class="user-chip-dot" id="user-chip-dot"></div>
      <span id="user-chip-name"></span>
      <span class="role-badge" id="user-chip-role"></span>
    </div>

    <!-- Admin link -->
    <a id="admin-link" href="/admin.html" target="_blank"
       class="btn" style="display:none;text-decoration:none">⚙️ 管理</a>

    <!-- Logout -->
    <button class="btn" id="btn-logout" onclick="doLogout()" style="display:none">退出</button>

    <div style="display:flex;align-items:center;gap:6px;margin-left:4px;">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text" style="font-size:12px;color:var(--text-muted)">连接中…</span>
    </div>
  </div>
</header>

<!-- ── Main layout ──────────────────────────────────────── -->
<div class="layout">

  <!-- Left sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">统计</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="stat-nodes">0</div>
          <div class="stat-label">节点</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-edges">0</div>
          <div class="stat-label">关系</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1;overflow-y:auto;">
      <div class="sidebar-title">节点标签</div>
      <div id="label-list" class="label-list">
        <div style="color:var(--text-muted);font-size:12px;">加载中…</div>
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="btn" id="btn-fit">⬜ 适应屏幕</button>
      <button class="btn" id="btn-layout">⊞ 重排布局</button>
      <button class="btn" id="btn-expand" title="展开选中节点的邻居">↗ 展开邻居</button>
    </div>
  </aside>

  <!-- Graph canvas -->
  <div class="canvas-wrap">
    <div id="graph-canvas"></div>

<!-- ── Toast container ─────────────────────────────────── -->
<div class="toast-container" id="toast-container"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API     = 'http://localhost:8000/api';
const WS_URL  = 'ws://localhost:8000/ws';

// ── Auth state ────────────────────────────────────────────────────────────────
let authToken   = localStorage.getItem('auth_token');
let currentUser = null;  // { sub, username, role }

// ── WebSocket state ───────────────────────────────────────────────────────────
let ws              = null;
let wsReconnectTimer = null;
const onlineUsers   = new Map();   // user_id -> { username, color }
const lockedEntities = new Map();  // entity_id -> { user_id, username, color }
const lockCallbacks  = new Map();  // entity_id -> resolve fn (Promise)
let currentEditingNodeId = null;
let currentEditingEdgeId = null;

// ── Color palette ─────────────────────────────────────────────────────────────
const PALETTE = [
  '#4C8EDA','#DA4C4C','#4CDA7A','#DAB44C',
  '#9B4CDA','#4CDADA','#DA4C9B','#DA8E4C',
  '#6EDAA0','#A04CDA','#4CA8DA','#DA6E4C',
];
const labelColorMap = {};
let colorIdx = 0;
function getLabelColor(label) {
  if (!labelColorMap[label]) {
    labelColorMap[label] = PALETTE[colorIdx++ % PALETTE.length];
  }
  return labelColorMap[label];
}

// ── Graph state ───────────────────────────────────────────────────────────────
let network = null;
let visNodes = new vis.DataSet();
let visEdges = new vis.DataSet();
let selectedNodeIds = [];
let selectedEdgeIds = [];
let pendingEdgeCallback = null;
let pendingNodeCallback = null;

// ── Auth functions ────────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display    = tab === 'login'    ? 'flex' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('auth-error').classList.remove('show');
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('show');
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { showAuthError('请填写用户名和密码'); return; }
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { showAuthError(data.detail || '登录失败'); return; }
    onLoginSuccess(data);
  } catch (e) { showAuthError('无法连接到服务器'); }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) { showAuthError('请填写所有字段'); return; }
  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showAuthError(data.detail || '注册失败'); return; }
    onLoginSuccess(data);
  } catch (e) { showAuthError('无法连接到服务器'); }
}

function onLoginSuccess(data) {
  authToken = data.token;
  currentUser = { username: data.username, role: data.role };
  localStorage.setItem('auth_token', authToken);
  document.getElementById('auth-overlay').classList.add('hidden');
  initUserUI();
  connectWS();
  initNetwork();
  checkStatus();
  refreshLabels();
  loadGraph();
  setInterval(checkStatus, 30000);
}

function doLogout() {
  authToken = null;
  currentUser = null;
  localStorage.removeItem('auth_token');
  if (ws) { ws.close(); ws = null; }
  document.getElementById('auth-overlay').classList.remove('hidden');
  // Reset UI
  document.getElementById('user-chip').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('admin-link').style.display = 'none';
  document.getElementById('online-users').innerHTML = '';
}

function initUserUI() {
  if (!currentUser) return;
  // User chip
  const chip = document.getElementById('user-chip');
  chip.style.display = 'flex';
  document.getElementById('user-chip-name').textContent = currentUser.username;
  const roleEl = document.getElementById('user-chip-role');
  roleEl.textContent = currentUser.role === 'admin' ? '管理员' : '用户';
  roleEl.className = 'role-badge ' + currentUser.role;
  // Color the dot
  const fakeId = currentUser.username;
  const colors = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#e91e63","#00bcd4","#ff5722"];
  const color = colors[Math.abs(hashCode(fakeId)) % colors.length];
  document.getElementById('user-chip-dot').style.background = color;
  // Logout & admin
  document.getElementById('btn-logout').style.display = 'flex';
  if (currentUser.role === 'admin') {
    document.getElementById('admin-link').style.display = 'flex';
  }
}

function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return h;
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  try {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(authToken ? { 'Authorization': 'Bearer ' + authToken } : {}),
      },
    };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const resp = await fetch(API + path, opts);
    if (resp.status === 401) {
      doLogout();
      throw new Error('登录已过期，请重新登录');
    }
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || resp.statusText);
    }
    return await resp.json();
  } catch (e) {
    toast('❌ ' + e.message, 'err');
    throw e;
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  if (!authToken) return;
  clearTimeout(wsReconnectTimer);
  try {
    ws = new WebSocket(`${WS_URL}?token=${authToken}`);
    ws.onopen = () => {
      console.log('WS connected');
    };
    ws.onmessage = (e) => {
      try { handleWSMessage(JSON.parse(e.data)); } catch {}
    };
    ws.onclose = (e) => {
      if (e.code === 4001) { doLogout(); return; }
      // Reconnect after 3s
      wsReconnectTimer = setTimeout(connectWS, 3000);
    };
    ws.onerror = () => {};
  } catch {}
}

function wsSend(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'init':
      // Populate online users and locks from server state
      onlineUsers.clear();
      msg.users.forEach(u => { if (u.username !== currentUser?.username) onlineUsers.set(u.user_id, u); });
      lockedEntities.clear();
      Object.values(msg.locks || {}).forEach(lk => lockedEntities.set(lk.entity_id, lk));
      renderOnlineUsers();
      // Apply existing locks visually
      lockedEntities.forEach((lk, eid) => applyLockVisual(eid, true, lk.username, lk.color));
      break;

    case 'user_joined':
      if (msg.user.username !== currentUser?.username) {
        onlineUsers.set(msg.user.user_id, msg.user);
        renderOnlineUsers();
        toast(`👤 ${msg.user.username} 加入了编辑`);
      }
      break;

    case 'user_left':
      const u = onlineUsers.get(msg.user_id);
      if (u) { toast(`👤 ${u.username} 离开了编辑`); }
      onlineUsers.delete(msg.user_id);
      renderOnlineUsers();
      break;

    case 'lock_result': {
      const cb = lockCallbacks.get(msg.entity_id);
      if (cb) {
        lockCallbacks.delete(msg.entity_id);
        if (!msg.success) {
          toast(`🔒 ${msg.locked_by ? `正在被「${msg.locked_by}」编辑` : '锁定失败，请稍后重试'}`, 'err');
        }
        cb(msg.success);
      }
      break;
    }

    case 'entity_locked':
      lockedEntities.set(msg.entity_id, { user_id: msg.user_id, username: msg.username, color: msg.color });
      applyLockVisual(msg.entity_id, true, msg.username, msg.color);
      // Refresh inspector if this entity is open
      refreshInspectorLock(msg.entity_id, true, msg.username);
      break;

    case 'entity_unlocked':
      lockedEntities.delete(msg.entity_id);
      applyLockVisual(msg.entity_id, false);
      refreshInspectorLock(msg.entity_id, false);
      break;

    case 'entity_created':
      if (msg.entity_type === 'node') {
        if (!visNodes.get(msg.entity.id)) visNodes.add(makeVisNode(msg.entity));
      } else {
        if (!visEdges.get(msg.entity.id)) visEdges.add(makeVisEdge(msg.entity));
      }
      updateStats(); updateEmptyState();
      break;

    case 'entity_updated':
      if (msg.entity_type === 'node') {
        const existing = visNodes.get(msg.entity.id);
        const lk = lockedEntities.get(msg.entity.id);
        visNodes.update(lk ? makeVisNodeLocked(msg.entity, lk.username, lk.color) : makeVisNode(msg.entity));
        // Refresh inspector if open on this node
        if (selectedNodeIds.includes(msg.entity.id)) showNodeInspector(msg.entity);
      } else {
        const existingE = visEdges.get(msg.entity.id);
        if (existingE) {
          visEdges.update(makeVisEdge(msg.entity));
          if (selectedEdgeIds.includes(msg.entity.id)) showEdgeInspector(msg.entity);
        }
      }
      break;

    case 'entity_deleted':
      if (msg.entity_type === 'node') {
        const connEdges = network ? network.getConnectedEdges(msg.entity_id) : [];
        visEdges.remove(connEdges);
        visNodes.remove(msg.entity_id);
        if (selectedNodeIds.includes(msg.entity_id)) hideInspector();
      } else {
        visEdges.remove(msg.entity_id);
        if (selectedEdgeIds.includes(msg.entity_id)) hideInspector();
      }
      updateStats(); updateEmptyState();
      break;
  }
}

// Heartbeat to keep locks alive
setInterval(() => wsSend({ type: 'heartbeat' }), 25000);

// ── Lock helpers ──────────────────────────────────────────────────────────────
function acquireLock(entityId) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    toast('⚠️ 未连接到协作服务器，将以本地模式编辑', 'err');
    return Promise.resolve(true);  // allow editing offline
  }
  return new Promise((resolve) => {
    lockCallbacks.set(entityId, resolve);
    wsSend({ type: 'lock_entity', entity_id: entityId });
    setTimeout(() => {
      if (lockCallbacks.has(entityId)) {
        lockCallbacks.delete(entityId);
        toast('⚠️ 锁定请求超时', 'err');
        resolve(false);
      }
    }, 5000);
  });
}

function releaseLock(entityId) {
  wsSend({ type: 'unlock_entity', entity_id: entityId });
}

// ── Lock visual ───────────────────────────────────────────────────────────────
function applyLockVisual(entityId, locked, username = '', color = '') {
  const vn = visNodes.get(entityId);
  if (vn) {
    if (locked) {
      visNodes.update(makeVisNodeLocked(vn._data, username, color));
    } else {
      visNodes.update(makeVisNode(vn._data));
    }
    return;
  }
  const ve = visEdges.get(entityId);
  if (ve) {
    if (locked) {
      visEdges.update({
        id: entityId,
        label: `${ve._data.type} 🔒${username}`,
        color: { color, highlight: color },
        width: 3,
        _data: ve._data,
      });
    } else {
      visEdges.update(makeVisEdge(ve._data));
    }
  }
}

function refreshInspectorLock(entityId, locked, username = '') {
  if (!selectedNodeIds.includes(entityId) && !selectedEdgeIds.includes(entityId)) return;
  const lockDiv = document.getElementById('inspector-lock-notice');
  const footer  = document.getElementById('inspector-footer');
  if (locked) {
    if (!lockDiv) {
      const div = document.createElement('div');
      div.id = 'inspector-lock-notice';
      div.className = 'lock-notice';
      div.textContent = `🔒 正在被「${username}」编辑，暂不可修改`;
      document.getElementById('inspector-body').prepend(div);
    }
    footer.querySelectorAll('.btn').forEach(b => { b.disabled = true; b.style.opacity = '.4'; });
  } else {
    if (lockDiv) lockDiv.remove();
    footer.querySelectorAll('.btn').forEach(b => { b.disabled = false; b.style.opacity = ''; });
  }
}

// ── Online users panel ────────────────────────────────────────────────────────
function renderOnlineUsers() {
  const container = document.getElementById('online-users');
  container.innerHTML = '';
  onlineUsers.forEach(u => {
    const av = document.createElement('div');
    av.className = 'user-avatar';
    av.style.background = u.color;
    av.textContent = u.username.charAt(0).toUpperCase();
    av.title = u.username;
    container.appendChild(av);
  });
}

// ── Node display ──────────────────────────────────────────────────────────────
function nodeLabel(n) {
  const p = n.properties || {};
  const name = p.name || p.title || p.label || p.id || p.code || p.key;
  if (name) return String(name).slice(0, 30);
  const keys = Object.keys(p);
  if (keys.length) return String(p[keys[0]]).slice(0, 20);
  return (n.labels && n.labels[0]) || 'Node';
}

function makeVisNode(n) {
  const color = getLabelColor(n.labels[0] || 'Node');
  return {
    id: n.id,
    label: nodeLabel(n),
    title: formatTooltip(n.labels, n.properties),
    color: { background: color, border: color, highlight: { background: color, border: '#fff' } },
    font: { color: '#fff', size: 12, face: 'sans-serif' },
    borderWidth: 2,
    shapeProperties: { borderDashes: false },
    _data: n,
  };
}

function makeVisNodeLocked(n, username, lockColor) {
  const color = getLabelColor(n.labels[0] || 'Node');
  return {
    id: n.id,
    label: `${nodeLabel(n)}\n🔒 ${username}`,
    title: `<div style="max-width:200px">🔒 <b>正在被「${username}」编辑</b></div>`,
    color: { background: color, border: lockColor, highlight: { background: color, border: lockColor } },
    font: { color: '#fff', size: 12, face: 'sans-serif' },
    borderWidth: 4,
    shapeProperties: { borderDashes: [6, 3] },
    _data: n,
  };
}

function makeVisEdge(e) {
  return {
    id: e.id,
    from: e.source,
    to: e.target,
    label: e.type,
    arrows: 'to',
    color: { color: '#8b949e', highlight: '#58a6ff' },
    font: { color: '#8b949e', size: 11, align: 'middle' },
    smooth: { type: 'curvedCW', roundness: 0.1 },
    _data: e,
  };
}

function formatTooltip(labels, props) {
  const entries = Object.entries(props || {});
  const propsHtml = entries.map(([k,v]) => `<b>${k}:</b> ${v}`).join('<br>');
  return `<div style="max-width:200px"><b>[${(labels||[]).join(', ')}]</b><br>${propsHtml}</div>`;
}

// ── Build network ─────────────────────────────────────────────────────────────
function initNetwork() {
  if (network) return;
  const container = document.getElementById('graph-canvas');
  const options = {
    nodes: { shape: 'dot', size: 20, borderWidth: 2, shadow: { enabled: true, color: 'rgba(0,0,0,.4)', size: 8 } },
    edges: { width: 1.5, shadow: false, selectionWidth: 3 },
    physics: {
      enabled: true,
      barnesHut: { gravitationalConstant: -8000, springLength: 120, springConstant: 0.04, damping: 0.09 },
      stabilization: { iterations: 150, updateInterval: 20 },
    },
    interaction: { hover: true, tooltipDelay: 300, multiselect: true, selectConnectedEdges: false },
    manipulation: { enabled: false },
  };

  network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, options);
  network.on('selectNode', onSelectNode);
  network.on('selectEdge', onSelectEdge);
  network.on('deselectNode', onDeselect);
  network.on('deselectEdge', onDeselect);
  network.on('doubleClick', onDoubleClick);
  network.on('stabilizationIterationsDone', () => network.setOptions({ physics: { enabled: false } }));
  updateEmptyState();
}

// ── Load graph ────────────────────────────────────────────────────────────────
async function loadGraph(labelFilter = '') {
  const url = labelFilter ? `/graph?label=${encodeURIComponent(labelFilter)}&limit=300` : '/graph?limit=300';
  const data = await api('GET', url);

  visNodes.clear();
  visEdges.clear();

  if (data.nodes.length) visNodes.add(data.nodes.map(n => {
    const lk = lockedEntities.get(n.id);
    return lk ? makeVisNodeLocked(n, lk.username, lk.color) : makeVisNode(n);
  }));
  if (data.edges.length) visEdges.add(data.edges.map(makeVisEdge));

  network.setOptions({ physics: { enabled: true } });
  setTimeout(() => network.setOptions({ physics: { enabled: false } }), 3000);

  updateStats();
  updateEmptyState();
  toast(`✅ 已加载 ${data.nodes.length} 节点, ${data.edges.length} 关系`);
  refreshLabels();
}

// ── Stats & labels ────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-nodes').textContent = visNodes.length;
  document.getElementById('stat-edges').textContent = visEdges.length;
}

function updateEmptyState() {
  document.getElementById('empty-state').classList.toggle('hidden', visNodes.length > 0);
}

async function refreshLabels() {
  try {
    const labels = await api('GET', '/labels');
    const list = document.getElementById('label-list');
    list.innerHTML = '';
    labels.forEach(lbl => {
      const color = getLabelColor(lbl);
      const item = document.createElement('div');
      item.className = 'label-item';
      item.innerHTML = `<div class="label-dot" style="background:${color}"></div><span class="label-name">${lbl}</span>`;
      item.onclick = () => loadGraph(lbl);
      list.appendChild(item);
    });
    if (!labels.length) list.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">暂无标签</div>';
  } catch {}
}

// ── Selection ─────────────────────────────────────────────────────────────────
function onSelectNode(params) {
  selectedNodeIds = params.nodes;
  selectedEdgeIds = [];
  if (params.nodes.length === 1) {
    const n = visNodes.get(params.nodes[0]);
    if (n) showNodeInspector(n._data);
  } else if (params.nodes.length > 1) {
    showMultiInspector(params.nodes.length, 0);
  }
}

function onSelectEdge(params) {
  selectedEdgeIds = params.edges;
  selectedNodeIds = [];
  if (params.edges.length === 1) {
    const e = visEdges.get(params.edges[0]);
    if (e) showEdgeInspector(e._data);
  }
}

function onDeselect() {
  selectedNodeIds = [];
  selectedEdgeIds = [];
  hideInspector();
}

// ── Inspector ─────────────────────────────────────────────────────────────────
function showNodeInspector(n) {
  document.getElementById('inspector-icon').textContent = '📦';
  document.getElementById('inspector-title').textContent = nodeLabel(n);

  const body   = document.getElementById('inspector-body');
  const footer = document.getElementById('inspector-footer');
  const lk = lockedEntities.get(n.id);

  const labelTags = (n.labels || []).map(l =>
    `<span class="tag" style="background:${getLabelColor(l)}22;color:${getLabelColor(l)};border:1px solid ${getLabelColor(l)}44">${l}</span>`
  ).join('');

  const propsHtml = Object.entries(n.properties || {}).map(([k, v]) => `
    <div class="prop-row"><div class="prop-key">${k}</div><div class="prop-val">${v}</div></div>
  `).join('') || '<div style="color:var(--text-muted);font-size:12px;">无属性</div>';

  body.innerHTML = `
    ${lk ? `<div id="inspector-lock-notice" class="lock-notice">🔒 正在被「${lk.username}」编辑，暂不可修改</div>` : ''}
    <div class="prop-section"><div class="prop-section-title">标签</div><div class="tag-list">${labelTags}</div></div>
    <div class="prop-section"><div class="prop-section-title">属性</div>${propsHtml}</div>
    <div class="prop-section"><div class="prop-section-title">ID</div><div class="prop-val" style="font-size:11px;word-break:break-all">${n.id}</div></div>
  `;

  const disabled = lk ? 'disabled style="opacity:.4"' : '';
  footer.innerHTML = `
    <button class="btn" onclick="openEditNodeModal('${n.id}')" ${disabled}>✏️ 编辑</button>
    <button class="btn danger" onclick="deleteNode('${n.id}')" ${disabled}>🗑 删除</button>
  `;

  document.getElementById('inspector').classList.remove('hidden');
}

function showEdgeInspector(e) {
  document.getElementById('inspector-icon').textContent = '🔗';
  document.getElementById('inspector-title').textContent = e.type;

  const body   = document.getElementById('inspector-body');
  const footer = document.getElementById('inspector-footer');
  const lk = lockedEntities.get(e.id);

  const propsHtml = Object.entries(e.properties || {}).map(([k, v]) => `
    <div class="prop-row"><div class="prop-key">${k}</div><div class="prop-val">${v}</div></div>
  `).join('') || '<div style="color:var(--text-muted);font-size:12px;">无属性</div>';

  body.innerHTML = `
    ${lk ? `<div id="inspector-lock-notice" class="lock-notice">🔒 正在被「${lk.username}」编辑，暂不可修改</div>` : ''}
    <div class="prop-section"><div class="prop-section-title">关系类型</div>
      <span class="tag" style="background:#58a6ff22;color:#58a6ff;border:1px solid #58a6ff44">${e.type}</span>
    </div>
    <div class="prop-section"><div class="prop-section-title">属性</div>${propsHtml}</div>
  `;

  const disabled = lk ? 'disabled style="opacity:.4"' : '';
  footer.innerHTML = `
    <button class="btn" onclick="openEditEdgeModal('${e.id}')" ${disabled}>✏️ 编辑</button>
    <button class="btn danger" onclick="deleteEdge('${e.id}')" ${disabled}>🗑 删除</button>
  `;

  document.getElementById('inspector').classList.remove('hidden');
}

function showMultiInspector(nodeCount) {
  document.getElementById('inspector-icon').textContent = '☰';
  document.getElementById('inspector-title').textContent = '多选';
  document.getElementById('inspector-body').innerHTML =
    `<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">已选中 ${nodeCount} 个节点</div>`;
  document.getElementById('inspector-footer').innerHTML =
    `<button class="btn danger" onclick="deleteSelected()">🗑 批量删除</button>`;
  document.getElementById('inspector').classList.remove('hidden');
}

function hideInspector() {
  document.getElementById('inspector').classList.add('hidden');
}

// ── Double click edit ─────────────────────────────────────────────────────────
function onDoubleClick(params) {
  if (params.nodes.length === 1) openEditNodeModal(params.nodes[0]);
  else if (params.edges.length === 1) openEditEdgeModal(params.edges[0]);
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  if (id === 'node-modal') {
    if (currentEditingNodeId) { releaseLock(currentEditingNodeId); currentEditingNodeId = null; }
    if (pendingNodeCallback) { pendingNodeCallback(null); pendingNodeCallback = null; }
  }
  if (id === 'edge-modal') {
    if (currentEditingEdgeId) { releaseLock(currentEditingEdgeId); currentEditingEdgeId = null; }
    if (pendingEdgeCallback) { pendingEdgeCallback(null); pendingEdgeCallback = null; }
  }
}

function addPropRow(editorId, key = '', val = '') {
  const editor = document.getElementById(editorId);
  const row = document.createElement('div');
  row.className = 'prop-edit-row';
  row.innerHTML = `
    <input type="text" placeholder="键" value="${key}" class="prop-key-input" />
    <input type="text" placeholder="值" value="${val}" class="prop-val-input" />
    <button class="prop-del-btn" onclick="this.parentElement.remove()">×</button>
  `;
  editor.appendChild(row);
}

function collectProps(editorId) {
  const props = {};
  document.querySelectorAll(`#${editorId} .prop-edit-row`).forEach(row => {
    const k = row.querySelector('.prop-key-input').value.trim();
    const v = row.querySelector('.prop-val-input').value.trim();
    if (k) props[k] = v;
  });
  return props;
}

function clearPropsEditor(editorId) {
  document.getElementById(editorId).innerHTML = '';
}

// ── Create node ───────────────────────────────────────────────────────────────
function openCreateNodeModal() {
  document.getElementById('node-modal-title').textContent = '新建节点';
  document.getElementById('node-labels').value = '';
  clearPropsEditor('node-props-editor');
  addPropRow('node-props-editor', 'name', '');
  document.getElementById('node-modal').classList.remove('hidden');
  document.getElementById('node-modal-save').onclick = saveNewNode;
  document.getElementById('node-labels').focus();
}

async function saveNewNode() {
  const labelsRaw = document.getElementById('node-labels').value.trim();
  const labels = labelsRaw ? labelsRaw.split(',').map(l => l.trim()).filter(Boolean) : ['Node'];
  const properties = collectProps('node-props-editor');
  try {
    const n = await api('POST', '/nodes', { labels, properties });
    visNodes.add(makeVisNode(n));
    updateStats(); updateEmptyState();
    closeModal('node-modal');
    toast('✅ 节点已创建');
    refreshLabels();
    setTimeout(() => { network.selectNodes([n.id]); network.focus(n.id, { animation: true, scale: 1.2 }); showNodeInspector(n); }, 100);
  } catch {}
}

// ── Edit node ─────────────────────────────────────────────────────────────────
async function openEditNodeModal(nodeId) {
  // Check if already locked by someone else (fast local check)
  const lk = lockedEntities.get(nodeId);
  if (lk) { toast(`🔒 该节点正在被「${lk.username}」编辑`, 'err'); return; }

  const acquired = await acquireLock(nodeId);
  if (!acquired) return;
  currentEditingNodeId = nodeId;

  const visNode = visNodes.get(nodeId);
  if (!visNode) { releaseLock(nodeId); currentEditingNodeId = null; return; }
  const n = visNode._data;

  document.getElementById('node-modal-title').textContent = '编辑节点';
  document.getElementById('node-labels').value = (n.labels || []).join(', ');
  clearPropsEditor('node-props-editor');
  Object.entries(n.properties || {}).forEach(([k, v]) => addPropRow('node-props-editor', k, v));
  document.getElementById('node-modal').classList.remove('hidden');
  document.getElementById('node-modal-save').onclick = () => saveEditNode(nodeId);
}

async function saveEditNode(nodeId) {
  const labelsRaw = document.getElementById('node-labels').value.trim();
  const labels = labelsRaw ? labelsRaw.split(',').map(l => l.trim()).filter(Boolean) : ['Node'];
  const properties = collectProps('node-props-editor');
  try {
    const n = await api('PUT', `/nodes/${nodeId}`, { labels, properties });
    visNodes.update(makeVisNode(n));
    currentEditingNodeId = null;  // prevent closeModal from double-releasing
    releaseLock(nodeId);
    closeModal('node-modal');
    toast('✅ 节点已更新');
    showNodeInspector(n);
    refreshLabels();
  } catch {}
}

// ── Delete node ───────────────────────────────────────────────────────────────
async function deleteNode(nodeId) {
  const lk = lockedEntities.get(nodeId);
  if (lk) { toast(`🔒 该节点正在被「${lk.username}」编辑，无法删除`, 'err'); return; }
  if (!confirm('确定删除这个节点及其所有关系吗？')) return;
  try {
    await api('DELETE', `/nodes/${nodeId}`);
    const connectedEdges = network.getConnectedEdges(nodeId);
    visEdges.remove(connectedEdges);
    visNodes.remove(nodeId);
    hideInspector(); updateStats(); updateEmptyState();
    toast('✅ 节点已删除');
    refreshLabels();
  } catch {}
}

async function deleteSelected() {
  if (!selectedNodeIds.length) return;
  const locked = selectedNodeIds.filter(id => lockedEntities.has(id));
  if (locked.length) { toast(`🔒 ${locked.length} 个节点正被编辑，无法删除`, 'err'); return; }
  if (!confirm(`确定删除选中的 ${selectedNodeIds.length} 个节点吗？`)) return;
  try {
    for (const id of selectedNodeIds) {
      await api('DELETE', `/nodes/${id}`);
      visEdges.remove(network.getConnectedEdges(id));
    }
    visNodes.remove(selectedNodeIds);
    hideInspector(); updateStats(); updateEmptyState();
    toast(`✅ 已删除 ${selectedNodeIds.length} 个节点`);
    refreshLabels();
  } catch {}
}

// ── Create edge ───────────────────────────────────────────────────────────────
function openCreateEdgeModal() {
  if (selectedNodeIds.length !== 2) { toast('⚠️ 请先选中两个节点（按住 Ctrl 多选）', 'err'); return; }
  document.getElementById('edge-modal-title').textContent = '新建关系';
  document.getElementById('edge-type').value = '';
  clearPropsEditor('edge-props-editor');
  document.getElementById('edge-modal').classList.remove('hidden');
  document.getElementById('edge-modal-save').onclick = () => saveNewEdge(selectedNodeIds[0], selectedNodeIds[1]);
  document.getElementById('edge-type').focus();
  loadRelTypes();
}

async function loadRelTypes() {
  try {
    const types = await api('GET', '/relationship-types');
    document.getElementById('rel-types-list').innerHTML = types.map(t => `<option value="${t}">`).join('');
  } catch {}
}

async function saveNewEdge(sourceId, targetId) {
  const type = document.getElementById('edge-type').value.trim().toUpperCase() || 'RELATES_TO';
  const properties = collectProps('edge-props-editor');
  try {
    const e = await api('POST', '/relationships/by-element-id?' +
      new URLSearchParams({ source_element_id: sourceId, target_element_id: targetId, type }));
    visEdges.add(makeVisEdge(e));
    updateStats();
    closeModal('edge-modal');
    toast('✅ 关系已创建');
  } catch {}
}

// ── Edit edge ─────────────────────────────────────────────────────────────────
async function openEditEdgeModal(edgeId) {
  const lk = lockedEntities.get(edgeId);
  if (lk) { toast(`🔒 该关系正在被「${lk.username}」编辑`, 'err'); return; }

  const acquired = await acquireLock(edgeId);
  if (!acquired) return;
  currentEditingEdgeId = edgeId;

  const visEdge = visEdges.get(edgeId);
  if (!visEdge) { releaseLock(edgeId); currentEditingEdgeId = null; return; }
  const e = visEdge._data;

  document.getElementById('edge-modal-title').textContent = '编辑关系';
  document.getElementById('edge-type').value = e.type || '';
  clearPropsEditor('edge-props-editor');
  Object.entries(e.properties || {}).forEach(([k, v]) => addPropRow('edge-props-editor', k, v));
  document.getElementById('edge-modal').classList.remove('hidden');
  document.getElementById('edge-modal-save').onclick = () => saveEditEdge(edgeId);
  loadRelTypes();
}

async function saveEditEdge(edgeId) {
  const properties = collectProps('edge-props-editor');
  try {
    const e = await api('PUT', `/relationships/${edgeId}`, { properties });
    visEdges.update(makeVisEdge(e));
    currentEditingEdgeId = null;
    releaseLock(edgeId);
    closeModal('edge-modal');
    toast('✅ 关系已更新');
    showEdgeInspector(e);
  } catch {}
}

// ── Delete edge ───────────────────────────────────────────────────────────────
async function deleteEdge(edgeId) {
  const lk = lockedEntities.get(edgeId);
  if (lk) { toast(`🔒 该关系正在被「${lk.username}」编辑，无法删除`, 'err'); return; }
  if (!confirm('确定删除这条关系吗？')) return;
  try {
    await api('DELETE', `/relationships/${edgeId}`);
    visEdges.remove(edgeId);
    hideInspector(); updateStats();
    toast('✅ 关系已删除');
  } catch {}
}

// ── Delete selected (keyboard) ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
    if (selectedNodeIds.length) deleteSelected();
    else if (selectedEdgeIds.length === 1) deleteEdge(selectedEdgeIds[0]);
  }
  if (e.key === 'Escape') { closeModal('node-modal'); closeModal('edge-modal'); }
});

// Auth overlay keyboard
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-username').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('reg-password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

// ── Search ────────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { document.getElementById('search-results').classList.add('hidden'); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
});

document.getElementById('search-input').addEventListener('blur', () => {
  setTimeout(() => document.getElementById('search-results').classList.add('hidden'), 200);
});

async function doSearch(q) {
  try {
    const results = await api('GET', `/search?q=${encodeURIComponent(q)}&limit=20`);
    const el = document.getElementById('search-results');
    if (!results.length) {
      el.innerHTML = '<div class="search-result-item" style="color:var(--text-muted)">无结果</div>';
    } else {
      el.innerHTML = results.map(n => {
        const color = getLabelColor(n.labels[0] || 'Node');
        return `<div class="search-result-item" onclick="focusNode('${n.id}')">
          <span class="result-label-tag" style="background:${color}33;color:${color}">${n.labels[0] || 'Node'}</span>
          <span class="result-name">${nodeLabel(n)}</span>
        </div>`;
      }).join('');
    }
    el.classList.remove('hidden');
  } catch {}
}

async function focusNode(nodeId) {
  document.getElementById('search-results').classList.add('hidden');
  document.getElementById('search-input').value = '';
  if (!visNodes.get(nodeId)) {
    try {
      const data = await api('GET', `/node-neighbors/${nodeId}`);
      const newNodes = data.nodes.filter(n => !visNodes.get(n.id));
      const newEdges = data.edges.filter(e => !visEdges.get(e.id));
      if (newNodes.length) visNodes.add(newNodes.map(makeVisNode));
      if (newEdges.length) visEdges.add(newEdges.map(makeVisEdge));
      updateStats(); updateEmptyState();
    } catch {}
  }
  if (visNodes.get(nodeId)) {
    network.selectNodes([nodeId]);
    network.focus(nodeId, { animation: { duration: 500 }, scale: 1.3 });
    const n = visNodes.get(nodeId);
    if (n) showNodeInspector(n._data);
  }
}

// ── Expand neighbors ──────────────────────────────────────────────────────────
document.getElementById('btn-expand').onclick = async () => {
  if (!selectedNodeIds.length) { toast('⚠️ 请先选中一个节点', 'err'); return; }
  try {
    for (const nodeId of selectedNodeIds) {
      const data = await api('GET', `/node-neighbors/${nodeId}`);
      const newNodes = data.nodes.filter(n => !visNodes.get(n.id));
      const newEdges = data.edges.filter(e => !visEdges.get(e.id));
      if (newNodes.length) visNodes.add(newNodes.map(makeVisNode));
      if (newEdges.length) visEdges.add(newEdges.map(makeVisEdge));
    }
    network.setOptions({ physics: { enabled: true } });
    setTimeout(() => network.setOptions({ physics: { enabled: false } }), 2000);
    updateStats(); updateEmptyState();
    toast('✅ 邻居节点已展开');
  } catch {}
};

// ── Status check ──────────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const s = await fetch(API + '/status').then(r => r.json());
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (s.connected) { dot.className = 'status-dot ok'; txt.textContent = '已连接'; }
    else             { dot.className = 'status-dot err'; txt.textContent = '未连接'; }
  } catch {
    document.getElementById('status-dot').className = 'status-dot err';
    document.getElementById('status-text').textContent = '服务不可用';
  }
}

// ── Button bindings ───────────────────────────────────────────────────────────
document.getElementById('btn-load').onclick = () => loadGraph();
document.getElementById('btn-add-node').onclick = openCreateNodeModal;
document.getElementById('btn-add-edge').onclick = openCreateEdgeModal;
document.getElementById('btn-delete').onclick = () => {
  if (selectedNodeIds.length) deleteSelected();
  else if (selectedEdgeIds.length === 1) deleteEdge(selectedEdgeIds[0]);
  else toast('⚠️ 请先选中要删除的元素', 'err');
};
document.getElementById('btn-fit').onclick = () => network && network.fit({ animation: true });
document.getElementById('btn-layout').onclick = () => {
  if (!network) return;
  network.setOptions({ physics: { enabled: true } });
  setTimeout(() => network.setOptions({ physics: { enabled: false } }), 2500);
};
document.getElementById('btn-zoom-in').onclick = () => network && network.moveTo({ scale: network.getScale() * 1.3, animation: true });
document.getElementById('btn-zoom-out').onclick = () => network && network.moveTo({ scale: network.getScale() * 0.77, animation: true });
document.getElementById('inspector-close').onclick = () => { hideInspector(); network && network.unselectAll(); };

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(overlay.id); });
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!authToken) return; // stay on auth overlay
  // Validate token
  try {
    const res = await fetch(API + '/auth/me', {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    if (!res.ok) { localStorage.removeItem('auth_token'); authToken = null; return; }
    const data = await res.json();
    currentUser = { username: data.username, role: data.role };
    document.getElementById('auth-overlay').classList.add('hidden');
    initUserUI();
    connectWS();
    initNetwork();
    checkStatus();
    refreshLabels();
    loadGraph();
    setInterval(checkStatus, 30000);
  } catch {
    // Server might be starting up — stay on overlay
    localStorage.removeItem('auth_token');
    authToken = null;
  }
}

init();
</script>
</body>
</html>
